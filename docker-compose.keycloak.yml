services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: iss-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import
