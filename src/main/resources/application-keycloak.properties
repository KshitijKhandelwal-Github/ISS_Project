app.security.mode=keycloak
spring.security.oauth2.client.registration.keycloak.client-id=iss-client
spring.security.oauth2.client.registration.keycloak.client-secret=
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.client-authentication-method=none
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8081/realms/iss
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/iss
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/iss/protocol/openid-connect/certs
